<!doctype html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Entrar · lumi</title>
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <style>
    html { margin: 0; padding: 0; background: var(--brand); }
    body {
      position: fixed;                    /* trava o body em 100% do viewport */
      top: 0; left: 0; right: 0; bottom: 0;
      margin: 0;
      padding: 40px;                      /* moldura coral nos 4 lados */
      box-sizing: border-box;
      display: flex;
      background: var(--brand);
      overflow: hidden;
    }

    /* Painel — VIDRO FOSCO sobre a moldura coral.
       Usa flex:1 dentro do body com padding pra garantir
       40px de coral em todas as bordas, sempre. */
    .login-shell {
      flex: 1;
      height: 100%;                       /* trava na altura disponível */
      align-self: stretch;
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      z-index: 1;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 28px 60px -28px rgba(45, 35, 29, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      /* Coral gradients + base translúcida do sidebar */
      background:
        radial-gradient(ellipse 38% 55% at 48% 108%, rgba(196, 104, 80, 0.32), transparent 62%),
        radial-gradient(ellipse 26% 40% at  0% 100%, rgba(196, 104, 80, 0.18), transparent 65%),
        radial-gradient(ellipse 30% 38% at 102%  0%, rgba(196, 104, 80, 0.14), transparent 65%),
        radial-gradient(ellipse 24% 30% at  -2% -2%, rgba(196, 104, 80, 0.12), transparent 70%),
        rgba(236, 224, 204, 0.82);   /* --sidebar @ 82% */
    }

    [data-theme="dark"] .login-shell {
      background:
        radial-gradient(ellipse 38% 55% at 48% 108%, rgba(196, 104, 80, 0.34), transparent 62%),
        radial-gradient(ellipse 26% 40% at  0% 100%, rgba(196, 104, 80, 0.18), transparent 65%),
        radial-gradient(ellipse 30% 38% at 102%  0%, rgba(196, 104, 80, 0.14), transparent 65%),
        radial-gradient(ellipse 24% 30% at  -2% -2%, rgba(196, 104, 80, 0.11), transparent 70%),
        rgba(34, 28, 24, 0.94);      /* --sidebar dark @ 94% — bem mais sólido */
    }

    /* ────── Coluna esquerda — marca ────── */
    .login-brand {
      background: transparent;       /* deixa o shell mostrar a atmosfera */
      padding: var(--space-7);
      display: flex;
      flex-direction: column;
      justify-content: center;       /* hero centralizado verticalmente */
      align-items: center;           /* centraliza horizontalmente */
      position: relative;
      overflow: hidden;
    }


    .login-brand__top {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .login-brand__mark {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: 18px;
      letter-spacing: -0.01em;
      color: var(--brand);
      line-height: 1;
      font-optical-sizing: auto;
    }
    .login-brand__sub {
      font-size: var(--fs-xs);
      font-weight: var(--fw-semibold);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .login-brand__hero {
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      max-width: 480px;
      position: relative;
      z-index: 2;
    }
    .login-brand__wordmark {
      font-family: var(--font-serif);
      font-weight: 500;
      font-size: clamp(96px, 12vw, 180px);
      letter-spacing: -0.04em;
      line-height: 0.92;
      color: var(--brand);
      font-optical-sizing: auto;
      margin: 0;
    }
    .login-brand__divider {
      width: 64px;
      height: 0.5px;
      background: var(--text-muted);
      opacity: 0.4;
      border: 0;
    }
    .login-brand__tagline {
      font-size: var(--fs-md);
      color: var(--text);
      max-width: 340px;
      line-height: 1.45;
      font-weight: var(--fw-medium);
    }
    .login-brand__tagline em {
      color: var(--brand-strong);
      font-style: normal;
      font-weight: var(--fw-semibold);
    }
    [data-theme="dark"] .login-brand__tagline em { color: var(--brand-soft); }

    .login-brand__footer {
      position: absolute;
      bottom: var(--space-7);
      left: var(--space-7);
      display: flex;
      flex-direction: column;
      gap: var(--space-2);
      font-size: var(--fs-xs);
      color: var(--text-muted);
      z-index: 2;
    }
    .login-brand__footer-row {
      display: inline-flex;
      align-items: center;
      gap: var(--space-2);
    }

    /* Bloco de marcos regulatórios — empilhado acima do footer, à esquerda */
    .login-brand__marks {
      position: absolute;
      bottom: calc(var(--space-7) + 56px);   /* acima do footer */
      left: var(--space-7);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      max-width: 280px;
      align-items: flex-start;
    }
    .login-brand__mark-row {
      display: inline-flex;
      align-items: center;
      gap: var(--space-3);
      font-size: var(--fs-xs);
      color: var(--text-muted);
    }
    .login-brand__mark-icon {
      width: 22px;
      height: 22px;
      border-radius: var(--radius-pill);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.5);
      color: var(--text);
      flex: none;
    }
    [data-theme="dark"] .login-brand__mark-icon {
      background: rgba(241, 230, 214, 0.06);
    }
    .login-brand__mark-row b {
      font-weight: var(--fw-semibold);
      color: var(--text);
      letter-spacing: 0.04em;
      margin-right: 6px;
    }

    /* ────── Coluna direita — form ────── */
    .login-form-col {
      background: transparent;       /* deixa o shell mostrar a atmosfera */
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-7);
      position: relative;
    }

    .login-form {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: var(--space-5);
      padding: var(--space-6);
      border: 1px solid var(--brand);
      border-radius: 20px;
      /* vidro fosco — translucidez sutil sobre o painel */
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    [data-theme="dark"] .login-form {
      background: rgba(255, 255, 255, 0.035);
    }
    .login-form__greeting {
      font-size: var(--fs-xl);
      font-weight: var(--fw-semibold);
      letter-spacing: -0.015em;
      line-height: 1.1;
      margin: 0;
    }
    .login-form__intro {
      color: var(--text-muted);
      font-size: var(--fs-sm);
      margin: 0;
    }

    .login-form__between {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
    }
    .login-form__forgot {
      font-size: var(--fs-sm);
      font-weight: var(--fw-medium);
      color: var(--brand-strong);
    }
    [data-theme="dark"] .login-form__forgot { color: var(--brand-soft); }

    .login-form__submit { width: 100%; padding: 14px 20px; font-size: var(--fs-md); }

    .login-form__divider {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      color: var(--text-faint);
      font-size: var(--fs-xs);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    .login-form__divider::before,
    .login-form__divider::after {
      content: "";
      flex: 1;
      height: 0.5px;
      background: var(--divider-strong);
    }

    .login-form__magic {
      width: 100%;
      padding: 13px 20px;
    }

    .login-form__help {
      font-size: var(--fs-sm);
      color: var(--text-muted);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }
    .login-form__help a {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: var(--text);
      font-weight: var(--fw-medium);
    }

    .login-toolbar {
      position: absolute;
      top: var(--space-4);
      right: var(--space-4);
      z-index: 5;
    }

    /* Responsive — abaixo de 880px empilha */
    @media (max-width: 880px) {
      .login-shell { grid-template-columns: 1fr; }
      .login-brand { padding: var(--space-5); min-height: 240px; }
      .login-brand__wordmark { font-size: 92px; }
      .login-form-col { padding: var(--space-5); }
    }
  </style>
</head>
<body>
  <div class="login-shell">
    <!-- ───── ESQUERDA: marca ───── -->
    <section class="login-brand">
      <div class="login-brand__hero">
        <h1 class="login-brand__wordmark">lumi</h1>
        <hr class="login-brand__divider" />
        <p class="login-brand__tagline">
          Plataforma para <em>cannabis medicinal</em> — do consultório à entrega, com regularidade.
        </p>

      </div>

      <footer class="login-brand__footer">
        <span class="login-brand__footer-row">
          <span class="status-dot status-dot--regulatory"></span>
          Ambiente regulado · acesso restrito
        </span>
        <span class="tabular">v0.5.5 · 2026</span>
      </footer>
    </section>

    <!-- ───── DIREITA: form ───── -->
    <section class="login-form-col">
      <div class="login-toolbar">
        <div class="theme-toggle" role="group" aria-label="Tema">
          <button class="theme-toggle__opt" data-theme-set="light" aria-pressed="true" aria-label="Tema claro">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m4.93 19.07 1.41-1.41"/><path d="m17.66 6.34 1.41-1.41"/></svg>
          </button>
          <button class="theme-toggle__opt" data-theme-set="dark" aria-pressed="false" aria-label="Tema escuro">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
      </div>

      <form class="login-form reveal" autocomplete="on">
        <div class="stack stack--sm">
          <h2 class="login-form__greeting">Olá.</h2>
          <p class="login-form__intro">Acesse a plataforma com seu e-mail corporativo.</p>
        </div>

        <div class="field">
          <label class="field__label" for="email">E-mail</label>
          <div class="field__wrap">
            <input
              id="email"
              class="field__input"
              type="email"
              name="email"
              autocomplete="email"
              placeholder="voce@empresa.com.br"
              value="emilia@setty.com.br"
              spellcheck="false"
            />
            <span class="field__adornment" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
          </div>
        </div>

        <div class="field">
          <label class="field__label" for="senha">Senha</label>
          <div class="field__wrap">
            <input
              id="senha"
              class="field__input"
              type="password"
              name="password"
              autocomplete="current-password"
              placeholder="••••••••"
              value="passwordsample"
            />
            <span class="field__adornment" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
          </div>
        </div>

        <div class="login-form__between">
          <label class="checkbox">
            <input class="checkbox__input" type="checkbox" checked />
            <span>Manter conectada</span>
          </label>
          <a class="login-form__forgot" href="#">Esqueci minha senha</a>
        </div>

        <button class="btn btn--primary login-form__submit" type="submit">
          Entrar
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>

        <div class="login-form__divider"><span>ou</span></div>

        <button class="btn btn--secondary login-form__magic" type="button">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7Z"/></svg>
          Receber link mágico por e-mail
        </button>

        <span class="login-form__help">
          Não tem acesso?
          <a href="#">
            Falar com a Setty
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
          </a>
        </span>
      </form>
    </section>
  </div>

  <script>
    const root = document.documentElement;
    const opts = document.querySelectorAll(".theme-toggle__opt");
    const apply = (mode) => {
      root.setAttribute("data-theme", mode);
      opts.forEach((b) => b.setAttribute("aria-pressed", b.dataset.themeSet === mode ? "true" : "false"));
      try { localStorage.setItem("lumi-theme", mode); } catch (_) {}
    };
    opts.forEach((b) => b.addEventListener("click", () => apply(b.dataset.themeSet)));
    try {
      const saved = localStorage.getItem("lumi-theme");
      if (saved === "light" || saved === "dark") apply(saved);
    } catch (_) {}
  </script>
</body>
</html>
